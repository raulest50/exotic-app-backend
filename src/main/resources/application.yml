
spring:
  application:
    name: exotic-app

  config:
    additional-location: classpath:application-secrets.properties

  datasource:
    #url: jdbc:mysql://mysql-container:3306/lacm-planta?createDatabaseIfNotExist=true # OLD MULTI-CONTAINER URL
    #url: jdbc:postgresql://dpg-cpuutq1u0jms73ahqplg-a.oregon-postgres.render.com:5432/lacmdb # RENDER EXTERNAL
    #url: jdbc:postgresql://dpg-cpuutq1u0jms73ahqplg-a:5432/lacmdb # RENDER INTERNAL
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true # LOCAL DEV
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    #driver-class-name: com.mysql.cj.jdbc.Driver
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'America/Bogota'

  jpa:
    #database-platform: org.hibernate.dialect.MySQL8Dialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: false
    show-sql: true
    hibernate:
      ddl-auto: validate  # Modo seguro - solo valida, no modifica
    properties:
      hibernate:
        globally_quoted_identifiers: true
        jdbc:
          time_zone: America/Bogota
        #dialect: org.hibernate.dialect.MySQL8Dialect
        #dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    time-zone: America/Bogota

  flyway:
    enabled: true  # Habilitado con baseline configurado
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  mvc:
    throw-exception-if-no-handler-found: true
    async:
      request-timeout: 30000
server:
  port: 8080
  error:
    path: /error
    whitelabel:
      enabled: false

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

